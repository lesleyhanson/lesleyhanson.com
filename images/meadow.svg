<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 340" preserveAspectRatio="xMidYMax meet">
  <defs>
    <!-- a single sorrowroot bloom, drawn once and reused -->
    <g id="bloom-lg">
      <g fill="#A8C6EC">
        <path d="M0,0 C-5,-7 -6,-17 0,-24 C6,-17 5,-7 0,0 Z"/>
        <path d="M0,0 C-5,-7 -6,-17 0,-24 C6,-17 5,-7 0,0 Z" transform="rotate(72)"/>
        <path d="M0,0 C-5,-7 -6,-17 0,-24 C6,-17 5,-7 0,0 Z" transform="rotate(144)"/>
        <path d="M0,0 C-5,-7 -6,-17 0,-24 C6,-17 5,-7 0,0 Z" transform="rotate(216)"/>
        <path d="M0,0 C-5,-7 -6,-17 0,-24 C6,-17 5,-7 0,0 Z" transform="rotate(288)"/>
      </g>
      <circle r="3" fill="#D8C79A"/>
    </g>
    <g id="bloom-mid">
      <g fill="#7FB0DE">
        <path d="M0,0 C-4,-5 -5,-13 0,-18 C5,-13 4,-5 0,0 Z"/>
        <path d="M0,0 C-4,-5 -5,-13 0,-18 C5,-13 4,-5 0,0 Z" transform="rotate(72)"/>
        <path d="M0,0 C-4,-5 -5,-13 0,-18 C5,-13 4,-5 0,0 Z" transform="rotate(144)"/>
        <path d="M0,0 C-4,-5 -5,-13 0,-18 C5,-13 4,-5 0,0 Z" transform="rotate(216)"/>
        <path d="M0,0 C-4,-5 -5,-13 0,-18 C5,-13 4,-5 0,0 Z" transform="rotate(288)"/>
      </g>
      <circle r="2.2" fill="#D8C79A"/>
    </g>
    <!-- tuft of meadow grass -->
    <g id="grass" fill="none" stroke-linecap="round">
      <path d="M0,0 C-3,-12 -4,-22 -9,-30"/>
      <path d="M4,0 C3,-14 4,-26 2,-36"/>
      <path d="M8,0 C10,-12 12,-20 17,-28"/>
      <path d="M12,0 C13,-10 12,-18 10,-24"/>
    </g>
    <!-- butterfly -->
    <g id="butterfly">
      <ellipse cx="-5" cy="-3" rx="5.5" ry="3.6" transform="rotate(-28 -5 -3)"/>
      <ellipse cx="5" cy="-3" rx="5.5" ry="3.6" transform="rotate(28 5 -3)"/>
      <ellipse cx="-3.6" cy="2.4" rx="3.6" ry="2.4" transform="rotate(-40 -3.6 2.4)"/>
      <ellipse cx="3.6" cy="2.4" rx="3.6" ry="2.4" transform="rotate(40 3.6 2.4)"/>
      <line x1="0" y1="-4" x2="0" y2="4" stroke-width="1.4" stroke-linecap="round"/>
    </g>
    <!-- swallow in flight -->
    <path id="swallow" d="M0,0 C5,-6 11,-7 16,-4 C12,-4 9,-2 8,1 C6,-1 3,-1 0,0 Z"/>
    <!-- firefly -->
    <g id="firefly">
      <circle r="5" fill="#D8C79A" opacity="0.22"/>
      <circle r="1.8" fill="#E9DDB8"/>
    </g>
    <!-- coral folk flower, rounded petals -->
    <g id="folk">
      <g fill="#DA8065">
        <ellipse cx="0" cy="-9" rx="4.5" ry="7.5"/>
        <ellipse cx="0" cy="-9" rx="4.5" ry="7.5" transform="rotate(72)"/>
        <ellipse cx="0" cy="-9" rx="4.5" ry="7.5" transform="rotate(144)"/>
        <ellipse cx="0" cy="-9" rx="4.5" ry="7.5" transform="rotate(216)"/>
        <ellipse cx="0" cy="-9" rx="4.5" ry="7.5" transform="rotate(288)"/>
      </g>
      <circle r="3" fill="#EACB8B"/>
    </g>
    <!-- sprig of gold berries -->
    <g id="berries">
      <path d="M0,0 C2,-8 4,-14 8,-20 M0,0 C-2,-9 -1,-16 -4,-22" stroke="#31538A" stroke-width="1.6" fill="none"/>
      <circle cx="8" cy="-22" r="3.4" fill="#D8C79A"/>
      <circle cx="-4" cy="-24" r="2.8" fill="#D8C79A"/>
      <circle cx="2" cy="-16" r="2.4" fill="#D8C79A"/>
    </g>
  </defs>

  <!-- distant hill -->
  <path d="M0,252 Q380,206 780,236 Q1200,264 1600,224 L1600,340 L0,340 Z" fill="#5D8FCB" opacity="0.32"/>
  <!-- middle hill -->
  <path d="M0,278 Q320,238 720,264 Q1160,288 1600,256 L1600,340 L0,340 Z" fill="#31538A" opacity="0.6"/>

  <!-- swallows in the sky -->
  <use href="#swallow" x="0" y="0" transform="translate(430,96) scale(1.15)" fill="#31538A" opacity="0.75"/>
  <use href="#swallow" x="0" y="0" transform="translate(492,72) scale(0.85)" fill="#31538A" opacity="0.6"/>
  <use href="#swallow" x="0" y="0" transform="translate(1132,84) scale(1) scale(-1,1)" fill="#31538A" opacity="0.65"/>

  <!-- rabbit, sitting on the ridge at the left -->
  <g transform="translate(238,214) scale(0.95)" fill="#1F3560">
    <path d="M10,50
             C7,48 6,44 7,40
             C7,34 8,30 10,28
             C7,27 5,25 6,23
             C7,21 9,21 11,22
             C11,17 10,8 12,3
             C14,2 15,6 15,12 L16,20
             C17,14 17,5 20,1
             C22,1 22,6 21,12 C21,16 20,20 19,23
             C23,25 26,29 27,34
             C31,36 35,40 36,44
             C37,48 35,50 32,50
             Z"/>
    <circle cx="33" cy="46" r="4"/>
  </g>

  <!-- foreground meadow -->
  <path d="M0,300 Q380,272 880,292 Q1240,304 1600,286 L1600,340 L0,340 Z" fill="#1F3560"/>

  <!-- grass tufts: darker behind, lighter catching the last light -->
  <g stroke="#31538A" stroke-width="2.2" opacity="0.9">
    <use href="#grass" transform="translate(70,296)"/>
    <use href="#grass" transform="translate(240,290) scale(0.9)"/>
    <use href="#grass" transform="translate(420,286) scale(1.1)"/>
    <use href="#grass" transform="translate(650,288)"/>
    <use href="#grass" transform="translate(840,294) scale(1.15)"/>
    <use href="#grass" transform="translate(1050,298) scale(0.95)"/>
    <use href="#grass" transform="translate(1330,294) scale(1.1)"/>
    <use href="#grass" transform="translate(1520,290)"/>
  </g>
  <g stroke="#1F3560" stroke-width="2.4">
    <use href="#grass" transform="translate(140,306) scale(1.2)"/>
    <use href="#grass" transform="translate(360,300)"/>
    <use href="#grass" transform="translate(560,302) scale(1.25)"/>
    <use href="#grass" transform="translate(760,306) scale(0.9)"/>
    <use href="#grass" transform="translate(960,308) scale(1.2)"/>
    <use href="#grass" transform="translate(1200,310)"/>
    <use href="#grass" transform="translate(1430,304) scale(1.15)"/>
  </g>

  <!-- sorrowroot blooms rising above the grass -->
  <g stroke="#31538A" stroke-width="1.8" fill="none">
    <path d="M188,300 C186,284 188,270 192,258"/>
    <path d="M512,296 C514,280 512,266 508,254"/>
    <path d="M700,300 C700,286 702,274 706,264"/>
    <path d="M905,302 C903,286 903,272 907,260"/>
    <path d="M1268,304 C1270,288 1268,276 1264,266"/>
    <path d="M1475,298 C1477,284 1475,272 1471,262"/>
  </g>
  <use href="#bloom-lg" transform="translate(192,254)"/>
  <use href="#bloom-mid" transform="translate(508,251)"/>
  <use href="#bloom-lg" transform="translate(706,260) scale(0.85)"/>
  <use href="#bloom-mid" transform="translate(907,257)"/>
  <use href="#bloom-lg" transform="translate(1264,262) scale(0.9)"/>
  <use href="#bloom-mid" transform="translate(1471,259) scale(1.1)"/>

  <!-- coral wildflowers and berry sprigs among the blue -->
  <g stroke="#31538A" stroke-width="1.6" fill="none">
    <path d="M382,300 C381,288 382,278 385,270"/>
    <path d="M742,302 C742,292 744,284 747,277"/>
    <path d="M1352,300 C1351,290 1352,282 1355,274"/>
  </g>
  <use href="#folk" transform="translate(385,266)"/>
  <use href="#folk" transform="translate(747,273) scale(0.85)"/>
  <use href="#folk" transform="translate(1355,270) scale(0.95)"/>
  <use href="#berries" transform="translate(608,290)"/>
  <use href="#berries" transform="translate(1052,296) scale(0.9)"/>

  <!-- butterflies drifting over the blooms -->
  <use href="#butterfly" transform="translate(246,224) rotate(-14)" fill="#A8C6EC" stroke="#A8C6EC"/>
  <use href="#butterfly" transform="translate(668,214) rotate(10) scale(0.85)" fill="#7FB0DE" stroke="#7FB0DE"/>
  <use href="#butterfly" transform="translate(1338,230) rotate(-8) scale(0.9)" fill="#A8C6EC" stroke="#A8C6EC"/>

  <!-- fireflies at dusk -->
  <use href="#firefly" transform="translate(120,246)"/>
  <use href="#firefly" transform="translate(452,232) scale(0.8)"/>
  <use href="#firefly" transform="translate(596,262)"/>
  <use href="#firefly" transform="translate(812,240) scale(0.9)"/>
  <use href="#firefly" transform="translate(1020,258) scale(0.75)"/>
  <use href="#firefly" transform="translate(1108,236)"/>
  <use href="#firefly" transform="translate(1394,252) scale(0.85)"/>
  <use href="#firefly" transform="translate(1560,240) scale(0.7)"/>
</svg>
